<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analytics & Reports | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.chart-box canvas{
  width:100%;
  max-width:600px;   /* chart max size */
  height:300px;      /* chart height */
  margin:auto;
}


.dashboard{
  display:flex;
  min-height:100vh;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}
body{
  display:flex;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar ul li a {
  color: #fff;
}
.sidebar{
  width:260px;
  background:#1f2933;
  min-height:100vh;
  color:#fff;
  padding:20px;
}
.sidebar h2{
  text-align:center;
  margin-bottom:30px;
}
.sidebar ul{
  list-style:none;
}
.sidebar ul li{
  padding:12px 15px;
  cursor:pointer;
  border-radius:6px;
  margin-bottom:8px;
}
.sidebar ul li:hover{
  background:#374151;
}
.sidebar ul li.logout{
  background:#dc2626;
}

/* Main */
.main{
  flex:1;
  padding:30px;
}

.page-title{
  margin-bottom:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.stat-box{
  background:#fff;
  padding:20px;
  border-radius:8px;
}

.stat-box h4{
  margin:0;
  color:#6b7280;
}

.stat-box p{
  font-size:24px;
  font-weight:bold;
  margin:10px 0 0;
}

/* Charts */
.chart-box{
  background:#fff;
  padding:20px;
  border-radius:8px;
  margin-bottom:25px;
}

.chart-box h3{
  margin-bottom:15px;
}
</style>
</head>

<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
  <a href="index.html">
  <img src="images/crowdfunding.png" alt="Crowdfunding" style="width:200px;">
</a>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="campaign.html">Create Campaign</a></li>
    <li><a href="mycampaign.html">My Campaigns</a></li>
    <li><a href="pledges.html">Pledges</a></li>
    <li><a href="updates.html">Updates</a></li>
    <li><a href="analytics.html">Analytics</a></li>
    <li><a href="withdrawals.html">Withdrawals</a></li>
    <li><a href="profile.html">Profile</a></li>
    <li class="logout"><a href="logout.html">Logout</a></li>
  </ul>
</div>
  <!-- Main -->
  <div class="main">

    <div class="page-title">
      <h2>Analytics & Reports</h2>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-box">
        <h4>Total Funds Raised</h4>
        <p>₹5,40,000</p>
      </div>
      <div class="stat-box">
        <h4>Total Pledges</h4>
        <p>1,245</p>
      </div>
      <div class="stat-box">
        <h4>Total Views</h4>
        <p>18,920</p>
      </div>
      <div class="stat-box">
        <h4>Conversion Rate</h4>
        <p>6.5%</p>
      </div>
    </div>

    <!-- Funds Raised Chart -->
    <div class="chart-box">
      <h3>Funds Raised</h3>
      <canvas id="fundsChart"></canvas>
    </div>

    <!-- Daily / Weekly Pledges -->
    <div class="chart-box">
      <h3>Daily / Weekly Pledges</h3>
      <canvas id="pledgeChart"></canvas>
    </div>

    <!-- Traffic & Views -->
    <div class="chart-box">
      <h3>Traffic & Views</h3>
      <canvas id="trafficChart"></canvas>
    </div>

  </div>
</div>

<script>
// Funds Raised Chart
new Chart(document.getElementById("fundsChart"), {
  type: "line",
  data: {
    labels: ["Week 1","Week 2","Week 3","Week 4"],
    datasets: [{
      label: "Funds (₹)",
      data: [120000, 210000, 350000, 540000],
      borderColor: "#2563eb",
      fill: false
    }]
  }
});

// Daily / Weekly Pledges
new Chart(document.getElementById("pledgeChart"), {
  type: "bar",
  data: {
    labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    datasets: [{
      label: "Pledges",
      data: [40, 60, 90, 70, 120, 180, 220],
      backgroundColor: "#22c55e"
    }]
  }
});

// Traffic & Views
new Chart(document.getElementById("trafficChart"), {
  type: "doughnut",
  data: {
    labels: ["Direct","Social Media","Email","Ads"],
    datasets: [{
      data: [45, 30, 15, 10],
      backgroundColor: ["#2563eb","#22c55e","#f59e0b","#ef4444"]
    }]
  }
});
</script>

</body>
</html>
