<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Campaign | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>


/* Layout */
.dashboard{
  display:flex;
  min-height:100vh;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}
body{
  display:flex;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#1f2933;
  min-height:100vh;
  color:#fff;
  padding:20px;
}
.sidebar h2{
  text-align:center;
  margin-bottom:30px;
}
.sidebar ul{
  list-style:none;
}
.sidebar ul li{
  padding:12px 15px;
  cursor:pointer;
  border-radius:6px;
  margin-bottom:8px;
}
.sidebar ul li:hover{
  background:#374151;
}
.sidebar ul li.logout{
  background:#dc2626;
}
.sidebar ul li a {
  color: #fff;
}

/* Main Content */
.main{
  flex:1;
  padding:30px;
}

.page-title{
  margin-bottom:25px;
}

.page-title h2{
  margin:0;
}

.page-title p{
  color:#555;
}

/* Form */
.campaign-form{
  max-width:700px;
  background:#fff;
  padding:25px;
  border-radius:8px;
}

.form-group{
  margin-bottom:18px;
}

.form-group label{
  display:block;
  font-weight:600;
  margin-bottom:6px;
}

.form-group input,
.form-group textarea,
.form-group select{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:6px;
}

.form-group small{
  color:#777;
}

.form-actions{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.btn-primary{
  background:#2563eb;
  color:#fff;
  border:none;
  padding:12px 25px;
  border-radius:6px;
  cursor:pointer;
}

.btn-secondary{
  background:#e5e7eb;
  border:none;
  padding:12px 25px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
  <a href="index.html">
  <img src="images/crowdfunding.png" alt="Crowdfunding" style="width:200px;">
</a>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="campaign.html">Create Campaign</a></li>
    <li><a href="mycampaign.html">My Campaigns</a></li>
    <li><a href="pledges.html">Pledges</a></li>
    <li><a href="updates.html">Updates</a></li>
    <li><a href="analytics.html">Analytics</a></li>
    <li><a href="withdrawals.html">Withdrawals</a></li>
    <li><a href="profile.html">Profile</a></li>
    <li class="logout"><a href="logout.html">Logout</a></li>
  </ul>
</div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="page-title">
      <h2>Create New Campaign</h2>
      <p>Launch your fundraising campaign by filling the details below.</p>
    </div>

    <form class="campaign-form">

      <div class="form-group">
        <label>Campaign Title</label>
        <input type="text" placeholder="Enter campaign title">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea rows="5" placeholder="Explain your campaign goal and impact"></textarea>
      </div>

      <div class="form-group">
        <label>Goal Amount</label>
        <input type="number" placeholder="Enter target amount (₹)">
      </div>

      <div class="form-group">
        <label>Deadline</label>
        <input type="date">
      </div>

      <div class="form-group">
        <label>Category</label>
        <select>
          <option>Select Category</option>
          <option>Education</option>
          <option>Medical</option>
          <option>Food & Hunger</option>
          <option>Disaster Relief</option>
          <option>Community Development</option>
        </select>
      </div>

      <div class="form-group">
        <label>Cover Image / Video</label>
        <input type="file">
        <small>Upload a campaign image or short video</small>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">🚀 Publish Campaign</button>
        <button type="reset" class="btn-secondary">Save as Draft</button>
      </div>

    </form>

  </div>
</div>

</body>
</html>
