<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile & Settings | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

.dashboard{
  display:flex;
  min-height:100vh;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}
body{
  display:flex;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#1f2933;
  min-height:100vh;
  color:#fff;
  padding:20px;
}
.sidebar h2{
  text-align:center;
  margin-bottom:30px;
}
.sidebar ul{
  list-style:none;
}
.sidebar ul li{
  padding:12px 15px;
  cursor:pointer;
  border-radius:6px;
  margin-bottom:8px;
}
.sidebar ul li:hover{
  background:#374151;
}
.sidebar ul li.logout{
  background:#dc2626;
}
.sidebar ul li a {
  color: #fff;
}

/* Main */
.main{
  flex:1;
  padding:30px;
}

.page-title{
  margin-bottom:20px;
}

/* Section */
.section{
  background:#fff;
  padding:20px;
  border-radius:8px;
  margin-bottom:25px;
}

.section h3{
  margin-bottom:15px;
}

/* Form */
.form-group{
  margin-bottom:15px;
}
.form-group label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
}
.form-group input,
.form-group select{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  background:#2563eb;
  color:#fff;
  border:none;
  padding:10px 20px;
  border-radius:6px;
  cursor:pointer;
}
button:hover{
  background:#1e40af;
}

/* Toggle */
.toggle{
  display:flex;
  align-items:center;
  gap:10px;
}
.toggle input{
  width:18px;
  height:18px;
}
</style>
</head>

<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
 <a href="index.html">
  <img src="images/crowdfunding.png" alt="Crowdfunding" style="width:200px;">
</a>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="campaign.html">Create Campaign</a></li>
    <li><a href="mycampaign.html">My Campaigns</a></li>
    <li><a href="pledges.html">Pledges</a></li>
    <li><a href="updates.html">Updates</a></li>
    <li><a href="analytics.html">Analytics</a></li>
    <li><a href="withdrawals.html">Withdrawals</a></li>
    <li><a href="profile.html">Profile</a></li>
    <li class="logout"><a href="logout.html">Logout</a></li>
  </ul>
</div>

  <!-- Main -->
  <div class="main">

    <div class="page-title">
      <h2>Profile & Settings</h2>
    </div>

    <!-- Creator Profile -->
    <div class="section">
      <h3>Creator Profile</h3>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" value="John Doe">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" value="john@email.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" value="+91 12345 67890">
      </div>
      <div class="form-group">
        <label>Bio</label>
        <input type="text" value="Campaign creator & social impact enthusiast">
      </div>
      <button>Update Profile</button>
    </div>

    <!-- Change Password -->
    <div class="section">
      <h3>Change Password</h3>
      <div class="form-group">
        <label>Current Password</label>
        <input type="password">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password">
      </div>
      <button>Change Password</button>
    </div>

    <!-- Notification Settings -->
    <div class="section">
      <h3>Notification Settings</h3>
      <div class="toggle">
        <input type="checkbox" checked>
        <label>Email Notifications</label>
      </div><br>
      <div class="toggle">
        <input type="checkbox" checked>
        <label>New Pledge Alerts</label>
      </div><br>
      <div class="toggle">
        <input type="checkbox">
        <label>Campaign Updates Alerts</label>
      </div><br>
      <button>Save Notification Settings</button>
    </div>

    <!-- Payment & Bank Info -->
    <div class="section">
      <h3>Payment & Bank Information</h3>
      <div class="form-group">
        <label>Bank Name</label>
        <input type="text" value="State Bank of India">
      </div>
      <div class="form-group">
        <label>Account Number</label>
        <input type="text" value="XXXX XXXX 4321">
      </div>
      <div class="form-group">
        <label>IFSC Code</label>
        <input type="text" value="SBIN0001234">
      </div>
      <button>Update Bank Info</button>
    </div>

  </div>
</div>

</body>
</html>
